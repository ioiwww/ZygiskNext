name: CI-Fixed

on:
  workflow_dispatch:
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4 # ترقية من v3 إلى v4
        with:
          submodules: "recursive"
          fetch-depth: 1

      - name: Dummy Keys
        run: |
          mkdir -p module
          # إنشاء مفاتيح فارغة ليتجاوز Gradle مرحلة التحقق
          [ -f module/public_key ] || echo "dummy" > module/public_key
          [ -f module/private_key ] || echo "dummy" > module/private_key

      - name: Setup Java
        uses: actions/setup-java@v4 # ترقية إلى v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Rust
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew zipRelease --no-daemon

      - name: Upload Artifact
        uses: actions/upload-artifact@v4 # الحل هنا: ترقية الإصدار
        with:
          name: Zygisk-Next-Release
          path: module/build/outputs/release/*.zip
