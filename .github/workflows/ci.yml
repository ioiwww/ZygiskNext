name: CI

on:
  [workflow_dispatch,push]
    
  

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CCACHE_COMPILERCHECK: "%compiler% -dumpmachine; %compiler% -dumpversion"
      CCACHE_NOHASHDIR: "true"
      CCACHE_HARDLINK: "true"
      CCACHE_BASEDIR: "${{ github.workspace }}"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: "recursive"
          fetch-depth: 0

      - name: Write key
        if: ${{ ( github.event_name != 'pull_request' && github.ref == 'refs/heads/master' ) || github.ref_type == 'tag' }}
        run: |
          mkdir -p module
          if [ ! -z "${{ secrets.PRIVATE_KEY }}" ]; then
            echo "Using keys from secrets..."
            echo '${{ secrets.PUBLIC_KEY }}' | base64 --decode > module/public_key
            echo '${{ secrets.PRIVATE_KEY }}' | base64 --decode > module/private_key
          else
            echo "Secrets not found. Generating compatible Ed25519 keys for ZygiskNext..."
            # توليد مفاتيح متوافقة مع متطلبات المشروع (32 bytes)
            openssl genpkey -algorithm ed25519 -outform DER -out module/private_key
            openssl pkey -in module/private_key -inform DER -pubout -outform DER -out module/public_key
            
            # تنظيف المفاتيح لتناسب الصيغة التي يتوقعها Java (Raw bytes)
            # ملاحظة: ZygiskNext أحياناً يتوقع المفتاح بدون Header الـ DER
            tail -c 32 module/private_key > module/private_key.raw && mv module/private_key.raw module/private_key
            tail -c 32 module/public_key > module/public_key.raw && mv module/public_key.raw module/public_key
            
            echo "Keys generated successfully."
          fi


      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3 # الإصدار المستقر لـ Gradle

      - name: Setup rust-cache
        uses: swatinem/rust-cache@v2 # تصحيح الإصدار من v4 إلى v2
        with:
          workspaces: zygiskd/src -> ../build/intermediates/rust
          cache-targets: false

      - name: Setup Rust
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android x86_64-linux-android i686-linux-android armv7-linux-androideabi

      - name: Set up ccache
        uses: hendrikmuhs/ccache-action@v1.2 # تصحيح الإصدار من v4 إلى v2
        with:
          max-size: 2G
          key: ${{ runner.os }}
          restore-keys: ${{ runner.os }}
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}

      - name: Build with Gradle
        run: |
          # إعطاء صلاحية التنفيذ للملف أولاً
          chmod +x gradlew
          
          # إضافة الإعدادات إلى gradle.properties
          echo 'org.gradle.parallel=true' >> gradle.properties
          echo 'org.gradle.vfs.watch=true' >> gradle.properties
          echo 'org.gradle.jvmargs=-Xmx2048m' >> gradle.properties
          echo 'android.native.buildOutput=verbose' >> gradle.properties
          sed -i 's/org.gradle.unsafe.configuration-cache=true//g' gradle.properties
          
          # تشغيل البناء
          ./gradlew :module:zipRelease
          ./gradlew :module:zipDebug


      - name: Prepare artifact
        if: success()
        id: prepareArtifact
        run: |
          releaseName=$(ls module/build/outputs/release/Zygisk-Next-v*-release.zip | awk -F '(/|.zip)' '{print $5}')
          debugName=$(ls module/build/outputs/release/Zygisk-Next-v*-debug.zip | awk -F '(/|.zip)' '{print $5}')
          echo "releaseName=$releaseName" >> $GITHUB_OUTPUT
          echo "debugName=$debugName" >> $GITHUB_OUTPUT
          
          unzip module/build/outputs/release/Zygisk-Next-v*-release.zip -d zksu-release
          unzip module/build/outputs/release/Zygisk-Next-v*-debug.zip -d zksu-debug
          
          releaseSymbolName="SYMBOLS-$releaseName.zip"
          debugSymbolName="SYMBOLS-$debugName.zip"
          echo "releaseSymbolName=$releaseSymbolName" >> $GITHUB_OUTPUT
          echo "debugSymbolName=$debugSymbolName" >> $GITHUB_OUTPUT
          
          zip -r $releaseSymbolName zygiskd/build/symbols/release
          zip -r $debugSymbolName zygiskd/build/symbols/debug

      - name: Upload release
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.releaseName }}
          path: "./zksu-release/*"

      - name: Upload debug
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.debugName }}
          path: "./zksu-debug/*"

      - name: Upload release symbols
        uses: actions/upload-artifact@v4 # تم تحديثها من v3 إلى v4 للتوافق
        with:
          name: ${{ steps.prepareArtifact.outputs.releaseName }}-symbols
          path: "zygiskd/build/symbols/release"

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.prepareArtifact.outputs.debugName }}-symbols
          path: "zygiskd/build/symbols/debug"
