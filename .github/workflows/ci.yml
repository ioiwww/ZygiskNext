Name: CI-Fast-Build

on:
  workflow_dispatch:
    inputs:
      post_telegram:
        description: 'Post to Telegram'
        required: false
        default: false
        type: boolean
  push:
    branches: [ master, main ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          submodules: "recursive"
          fetch-depth: 1 # سرعة أكبر في التحميل

      - name: Generate Dummy Keys
        run: |
          mkdir -p module
          # توليد مفاتيح وهمية إذا كانت الـ Secrets فارغة ليتمكن Gradle من الإكمال
          if [ -z "${{ secrets.PRIVATE_KEY }}" ]; then
            echo "Generating dummy keys for build..."
            echo "dummy_public_key" > module/public_key
            echo "dummy_private_key" > module/private_key
          else
            echo '${{ secrets.PUBLIC_KEY }}' | base64 --decode > module/public_key
            echo '${{ secrets.PRIVATE_KEY }}' | base64 --decode > module/private_key
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Rust
        run: |
          rustup override set nightly
          rustup target add aarch64-linux-android
          # نكتفي بمعمارية واحدة إذا أردت سرعة قصوى، لكن تركتها لضمان التوافق
          rustup target add x86_64-linux-android

      - name: Build Release
        run: |
          chmod +x gradlew
          # إعدادات لتسريع Gradle
          ./gradlew zipRelease \
            -Dorg.gradle.parallel=true \
            -Dorg.gradle.vfs.watch=true \
            -Dorg.gradle.jvmargs="-Xmx2048m" \
            --no-daemon

      - name: Upload Fast Release
        uses: actions/upload-artifact@v3
        with:
          name: Zygisk-Next-Fast-Build
          path: module/build/outputs/release/*.zip
